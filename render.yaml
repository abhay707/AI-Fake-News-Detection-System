services:
  - type: web
    name: fake-news-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false          # set manually in Render dashboard
      - key: MODEL_PATH
        value: ./models
      - key: ENVIRONMENT
        value: production
